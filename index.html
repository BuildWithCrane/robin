<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN HOOD // DIRECTORY</title>
    <style>
        :root {
            --win-gray: #c0c0c0;
            --tkp-red: #cc0000;
            --bg-teal: #008080;
        }

        body {
            background-color: var(--bg-teal);
            font-family: "Tahoma", sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .window {
            background: var(--win-gray);
            width: 100%;
            max-width: 850px;
            border: 2px outset #fff;
            box-shadow: 6px 6px 0px #000;
        }

        header {
            background: #fff;
            margin: 10px;
            border: 2px inset #fff;
            padding: 35px;
            display: grid;
            grid-template-columns: 1fr 180px;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .branding-text {
            border-left: 8px solid var(--tkp-red);
            padding-left: 20px;
        }

        .logo-font {
            font-family: "Impact", "Arial Black", sans-serif;
            font-size: 58px;
            line-height: 0.9;
            color: #000;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin: 0;
        }

        .logo-font span {
            color: var(--tkp-red);
        }

        .mission-statement {
            font-size: 12px;
            margin-top: 12px;
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-stamp {
            width: 150px;
            height: auto;
            filter: grayscale(1) contrast(1.4); 
            opacity: 0.9;
            transform: rotate(4deg);
        }

        .all4you-mark {
            position: absolute;
            top: 10px;
            right: 15px;
            font-family: monospace;
            font-size: 10px;
            font-weight: bold;
            color: #bbb;
            text-transform: uppercase;
        }

        main {
            background: #fff;
            margin: 0 10px 10px;
            border: 2px inset #fff;
            max-height: 500px; /* Limits height so it's a scrollable archive */
            overflow-y: scroll;
        }

        /* Custom scrollbar to match the vibe */
        main::-webkit-scrollbar { width: 16px; }
        main::-webkit-scrollbar-track { background: #dfdfdf; border-left: 1px solid #808080; }
        main::-webkit-scrollbar-thumb { background: #c0c0c0; border: 2px outset #fff; }

        .file-row {
            display: flex;
            border-bottom: 1px solid #c0c0c0;
            transition: background 0.1s;
            text-decoration: none;
            color: #000;
        }

        .file-row:hover {
            background: var(--tkp-red);
            color: #fff !important;
        }

        .file-row:hover .file-desc { color: #eee; }
        .file-row:hover .file-id { border-color: #fff; color: #fff; }

        .file-id {
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            border-right: 1px solid #c0c0c0;
            display: flex;
            align-items: center;
            min-width: 50px;
            justify-content: center;
        }

        .file-info {
            padding: 12px;
            flex-grow: 1;
        }

        .file-name {
            font-weight: bold;
            font-size: 16px;
            display: block;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .file-desc {
            font-size: 11px;
            color: #666;
            font-family: monospace;
            word-break: break-all;
        }

        footer {
            padding: 15px;
            font-size: 10px;
            text-align: center;
            color: #444;
            border-top: 1px solid #808080;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="window">
    <header>
        <div class="all4you-mark">An all4you project</div>
        <div class="branding-text">
            <h1 class="logo-font">ROBIN<br><span>HOOD</span></h1>
            <div class="mission-statement">Common Goods Distribution Hub</div>
        </div>
        <img src="image_39801e.png" class="logo-stamp" alt="Seal">
    </header>

    <main>
        <a href="https://istanbul-index.link" class="file-row">
            <div class="file-id">001</div>
            <div class="file-info">
                <span class="file-name">The Istanbul Index</span>
                <span class="file-desc">Automated media repository. Passive directory of cultural transmissions.</span>
            </div>
        </a>

        <script>
            const main = document.querySelector('main');
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            
            function genString(length) {
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            for (let i = 2; i <= 40; i++) {
                let id = i.toString().padStart(3, '0');
                let row = document.createElement('div');
                row.className = 'file-row';
                row.style.opacity = "0.5";
                row.style.cursor = "default";
                
                row.innerHTML = `
                    <div class="file-id">${id}</div>
                    <div class="file-info">
                        <span class="file-name">${genString(12)}</span>
                        <span class="file-desc">${genString(24)}</span>
                    </div>
                `;
                main.appendChild(row);
            }
        </script>
    </main>

    <footer>
        &copy; 2019 ROBIN HOOD // RECLAIM THE COMMONS
    </footer>
</div>

</body>
</html>
