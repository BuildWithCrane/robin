<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin Hood - The galaxy's most resilient file service</title>
    <style>
        body {
            background-color: #fff;
            color: #000;
            font-family: Arial, sans-serif;
            font-size: 11.5px; /* Replicating the distinct, small font size */
            margin: 0;
            padding: 0;
            line-height: 1.2;
        }

        #top-header {
            position: relative;
            text-align: center;
            padding-top: 20px;
        }

        #support-text {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #cc0000;
            font-weight: bold;
            font-size: 12px;
        }

        #logo-container {
            margin: 0 auto;
            text-align: center;
        }

        #logo {
            border: none;
            max-width: 280px; /* Adjust as needed */
        }

        #site-title {
            font-family: Times, serif; /* Serifa-style font close to the original */
            font-size: 40px;
            font-weight: normal;
            margin: -5px 0 30px 0;
            color: #000;
        }

        #search-section {
            margin: 0 auto;
            max-width: 630px;
            text-align: center;
        }

        .nav-links {
            margin-bottom: 8px;
            font-size: 11.5px;
        }

        .nav-links a, .sub-links a {
            color: #000099;
            text-decoration: underline;
            padding: 0 4px;
        }

        .sub-links {
            position: absolute;
            right: 0px;
            top: 0px;
            font-size: 11px;
            line-height: 1.5;
        }

        #search-box {
            position: relative;
            border: 1px solid #7f9db9; /* Specific browser border color */
            background-color: #f7f7f7;
            padding: 2px 2px 0 2px;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            border: none;
            padding: 1px 0;
            font-size: 12px;
            background-color: #f7f7f7;
        }

        .categories {
            margin-top: 5px;
            font-size: 10px;
            line-height: 1.3;
        }

        .categories label {
            padding-right: 15px;
        }

        .categories input {
            vertical-align: middle;
            margin: 0 2px 0 0;
        }

        #submit-section {
            margin-top: 10px;
            margin-bottom: 30px;
        }

        input[type="submit"] {
            background-color: #efefef;
            border: 1px solid #767676;
            color: #000;
            font-size: 11px;
            padding: 2px 10px;
            margin: 0 3px;
            cursor: pointer;
        }

        #page-wrapper {
            margin: 0 20px;
        }
    </style>
</head>
<body>

    <div id="top-header">
        <span id="support-text">Support</span>
    </div>

    <div id="page-wrapper">
        
        <div id="logo-container">
            <img src="robinhood.png" alt="Robin Hood Logo" id="logo">
            <h1 id="site-title">Robin Hood</h1>
        </div>

        <div id="search-section">
            <nav class="nav-links">
                <strong>Search Torrents</strong> | 
                <a href="#">Browse Torrents</a> | 
                <a href="#">Recent Torrents</a> | 
                <a href="#">TV shows</a> | 
                <a href="#">Music</a> | 
                <a href="#">Top 100</a>
            </nav>

            <form action="/s/" method="get">
                <div id="search-box">
                    <input type="text" name="q" value="">
                    
                    <div class="sub-links">
                        <a href="#">Preferences</a><br>
                        <a href="#">Languages</a>
                    </div>

                    <div class="categories">
                        <label><input type="checkbox" name="all" value="1" checked="checked">All</label>
                        <label><input type="checkbox" name="audio" value="1">Audio</label>
                        <label><input type="checkbox" name="video" value="1">Video</label>
                        <label><input type="checkbox" name="apps" value="1">Applications</label>
                        <label><input type="checkbox" name="games" value="1">Games</label>
                        <label><input type="checkbox" name="other" value="1">Other</label>
                    </div>
                </div>

                <div id="submit-section">
                    <input type="submit" name="search" value="Pirate Search">
                    <input type="submit" name="luck" value="I'm Feeling Lucky">
                </div>
            </form>
        </div>

    </div>

</body>
</html>
