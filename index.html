<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robin Hood Index</title>
    <style>
        /* Strict Archivist Aesthetic */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Helvetica", "Arial", sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 40px;
            margin-bottom: 40px;
        }

        #logo {
            width: 600px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .branding {
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Navigation */
        nav {
            margin-bottom: 40px;
            font-size: 13px;
        }

        nav a {
            color: #000;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* The Directory */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            padding: 10px 5px;
        }

        td {
            padding: 20px 5px;
            border-bottom: 1px solid #e5e5e5;
            vertical-align: top;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #0000ee;
            text-decoration: none;
        }

        .item-name:hover {
            text-decoration: underline;
        }

        .item-desc {
            font-size: 14px;
            color: #333;
            margin-top: 4px;
        }

        .item-meta {
            font-family: monospace;
            font-size: 12px;
            text-align: right;
        }

        footer {
            margin-top: 100px;
            padding-top: 20px;
            border-top: 1px solid #000;
            font-size: 12px;
        }

        .all4you {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="robinhood.png" alt="Robin Hood" id="logo">
            <div class="branding">Robin Hood Archive</div>
        </header>

        <nav>
            <a href="#">Movies</a>
            <a href="#">TV Shows</a>
            <a href="#">Info</a>
        </nav>

        <table>
            <thead>
                <tr>
                    <th>Entry Name</th>
                    <th style="text-align: right;">Type</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <a href="YOUR_LINK_HERE" class="item-name">The Istanbul Index</a>
                        <div class="item-desc">Movies, TV, and more</div>
                    </td>
                    <td class="item-meta">INDEX</td>
                </tr>
            </tbody>
        </table>

        <footer>
            <span class="all4you">An all4you project</span>
        </footer>
    </div>

</body>
</html>
