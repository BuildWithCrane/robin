<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROBIN HOOD</title>
    <style>
        /* 90s Brutalist/Minimalist Style */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Arial", "Helvetica", sans-serif;
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        #logo-container {
            text-align: center;
            padding: 40px 0;
        }

        #logo {
            width: 700px; /* Big impact as requested */
            height: auto;
            border: none;
        }

        .project-credit {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 2px solid #000;
            display: inline-block;
        }

        /* The Index Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #000;
            color: #fff;
            text-align: left;
            padding: 8px 12px;
            font-size: 13px;
            letter-spacing: 1px;
        }

        td {
            padding: 12px;
            border: 1px solid #000;
            font-size: 14px;
        }

        /* Direct Link Styling */
        .dir-link {
            font-weight: bold;
            color: #0000ff;
            text-decoration: none;
        }

        .dir-link:hover {
            background-color: #000;
            color: #fff;
            text-decoration: none;
        }

        .description {
            color: #333;
        }

        .type-cell {
            font-family: "Courier New", Courier, monospace;
            font-size: 12px;
            text-align: center;
            width: 80px;
        }

        footer {
            margin-top: 40px;
            font-size: 11px;
            color: #666;
            text-align: center;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div id="logo-container">
            <img src="robinhood.png" alt="ROBIN HOOD" id="logo">
        </div>

        <div class="project-credit">
            An all4you project
        </div>

        <table>
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>DESCRIPTION</th>
                    <th>TYPE</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <a href="https://index.istan.to/" class="dir-link">The Istanbul Index</a>
                    </td>
                    <td class="description">Movies, TV, and more</td>
                    <td class="type-cell">[DIR]</td>
                </tr>
            </tbody>
        </table>

        <footer>
            ROBIN HOOD INDEX
        </footer>

    </div>

</body>
</html>
